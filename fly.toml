# fly.toml - Fly.io configuration for Tamizh Todo App
app = "tamizh-todo"
primary_region = "sin"  # Singapore — closest to India

[build]

[env]
  NODE_ENV = "production"
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [http_service.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1

# Persistent volume for SQLite database
[[mounts]]
  source = "tamizh_data"
  destination = "/app/.data"
  initial_size = "1gb"
